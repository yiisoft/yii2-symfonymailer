permissions:
  contents: read

on:
    pull_request:
      paths-ignore:
        - 'docs/**'
        - 'README.md'
        - 'CHANGELOG.md'
        - '.gitignore'
        - '.gitattributes'
        - 'infection.json.dist'
        - 'phpunit.xml.dist'

    push:
      paths-ignore:
        - 'docs/**'
        - 'README.md'
        - 'CHANGELOG.md'
        - '.gitignore'
        - '.gitattributes'
        - 'infection.json.dist'
        - 'phpunit.xml.dist'

name: ecs

jobs:
  easy-coding-standard:
    uses: yiisoft/actions/.github/workflows/ecs.yml@ab62d6b3b0e0cff6c9724ec5a395bedb41c639a2
    with:
      os: >-
        ['ubuntu-latest']
      php: >-
        ['8.1']
